<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login - ValuableCoins</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html">ValuableCoins</a>
      <nav class="nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="new-coins.html" class="nav-link">New Coins</a>
        <a href="about.html" class="nav-link">About</a>
        <a id="nav-create" href="create-loadout.html" class="nav-link">Create</a>
        <a href="loadouts.html" class="nav-link">Loadouts</a>
        <a id="nav-signup" href="signup.html" class="nav-link">Sign Up</a>
        <a id="nav-profile" href="profile.html" class="nav-link">Profile</a>
      </nav>
    </div>
  </header>

  <main class="container" style="padding:28px 0">
    <h1>Login</h1>
    <p class="small">Sign in with your email and password.</p>

    <form id="loginForm" style="max-width:420px;margin-top:12px">
      <label>Email<br><input id="loginEmail" required type="email" style="width:100%;padding:8px;margin-top:6px;border-radius:6px"></label>
      <label style="display:block;margin-top:10px">Password<br><input id="loginPass" required type="password" style="width:100%;padding:8px;margin-top:6px;border-radius:6px"></label>
      <p style="margin-top:12px"><button class="btn primary" type="submit">Sign in</button> <a href="signup.html" class="btn">Sign up</a></p>
      <p id="msg" class="small" style="margin-top:8px;color:var(--accent-2)"></p>
    </form>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div>© <span id="yearLogin"></span> ValuableCoins</div>
      <div class="small">Local demo login</div>
    </div>
  </footer>

    <script src="server-config.js"></script>
    <script src="api-client.js"></script>
    <script src="storage-display.js"></script>
  <script>
    document.getElementById('yearLogin').textContent = new Date().getFullYear();
    document.getElementById('loginForm').addEventListener('submit', async function(e){
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim().toLowerCase();
      const pass = document.getElementById('loginPass').value;
      document.getElementById('msg').textContent = 'Logging in...';
      document.querySelector('button[type=submit]').disabled = true;
      
      try {
        const result = await VC.login(email, pass);
        if(result){
          window.location.href = 'profile.html';
        } else {
          document.getElementById('msg').textContent = 'Invalid email or password.';
          document.querySelector('button[type=submit]').disabled = false;
        }
      } catch(err) {
        document.getElementById('msg').textContent = 'Error: ' + (err.message || 'Login failed');
        document.querySelector('button[type=submit]').disabled = false;
      }
    });
  </script>
</body>
</html>
