<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Loadouts - ValuableCoins</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html">ValuableCoins</a>
      <nav class="nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="new-coins.html" class="nav-link">New Coins</a>
        <a href="about.html" class="nav-link">About</a>
        <a id="nav-create" href="create-loadout.html" class="nav-link">Create</a>
        <a href="loadouts.html" class="nav-link">Loadouts</a>
        <a id="nav-login" href="login.html" class="nav-link">Login</a>
        <a id="nav-signup" href="signup.html" class="nav-link">Sign Up</a>
        <a id="nav-profile" href="profile.html" class="nav-link">Profile</a>
      </nav>
    </div>
  </header>

  <main class="container" style="padding:28px 0">
    <h1>Newest Loadouts</h1>
    <p class="small">See recent uploads from other players. Click "Send Trade Request" to propose a trade.</p>

    <div id="list" class="grid" style="margin-top:12px"></div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div>© <span id="year7"></span> ValuableCoins</div>
      <div class="small">Pictures stored locally on your device</div>
    </div>
  </footer>

    <script src="server-config.js"></script>
    <script src="api-client.js"></script>
    <script src="storage-display.js"></script>
  <script>
    document.getElementById('year7').textContent = new Date().getFullYear();
    const current = VC.getCurrentUser();
    const list = document.getElementById('list');

    // helper to render loadout
    function renderLoadout(l){
      const card = document.createElement('div'); card.className='card';
      const imgSrc = l.image || '';
      card.innerHTML = `
        <img src="${imgSrc}" alt="${l.title||''}" style="width:100%;height:160px;object-fit:cover;border-radius:6px;margin-bottom:8px">
        <h3>${l.title||''}</h3>
        <p class="small">Owner: ${l.owner||''}</p>
      `;
      const actions = document.createElement('div'); actions.style.marginTop='8px';
      if(current && current !== l.owner){
        const btn = document.createElement('button'); btn.className='btn'; btn.textContent='Send Trade Request';
        btn.addEventListener('click', async ()=>{
          try {
            const id = Date.now().toString(36)+Math.random().toString(36).slice(2,8);
            await VC.createRequest(current, l.owner, l.id);
            btn.textContent = 'Request Sent'; 
            btn.disabled = true;
          } catch(err) {
            console.error('Request error:', err);
            btn.textContent = 'Error sending';
          }
        });
        actions.appendChild(btn);
      } else if(!current){
        const a = document.createElement('a'); a.className='btn'; a.href='signup.html'; a.textContent='Sign in to request'; actions.appendChild(a);
      }
      card.appendChild(actions);
      return card;
    }

    // load and display loadouts
    (async () => {
      try {
        const loadouts = await VC.getLoadouts();
        loadouts.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
        if(!loadouts.length) list.innerHTML = '<p class="small">No loadouts yet. Be the first by creating one.</p>';
        else loadouts.forEach(l=> list.appendChild(renderLoadout(l)));
      } catch(err) {
        console.error('Loadouts error:', err);
        list.innerHTML = '<p class="small">Error loading loadouts.</p>';
      }
    })();
  </script>
</body>
</html>
