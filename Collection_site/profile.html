<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Profile - ValuableCoins</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html">ValuableCoins</a>
      <nav class="nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="new-coins.html" class="nav-link">New Coins</a>
        <a href="about.html" class="nav-link">About</a>
        <a id="nav-create" href="create-loadout.html" class="nav-link">Create</a>
        <a href="loadouts.html" class="nav-link">Loadouts</a>
        <a id="nav-signup" href="signup.html" class="nav-link">Sign Up</a>
        <a id="nav-profile" href="profile.html" class="nav-link">Profile</a>
      </nav>
    </div>
  </header>

  <main class="container" style="padding:28px 0">
    <h1>Your Profile</h1>
    <div id="profileBox" style="margin-top:12px;max-width:600px"></div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div>© <span id="year5"></span> ValuableCoins</div>
      <div class="small">Profile stored locally</div>
    </div>
  </footer>

    <script src="server-config.js"></script>
    <script src="api-client.js"></script>
    <script src="storage-display.js"></script>
  <script>
    document.getElementById('year5').textContent = new Date().getFullYear();

    const current = VC.getCurrentUser();
    const box = document.getElementById('profileBox');
    
    if(!current){
      box.innerHTML = '<p class="small">No user signed in. <a href="signup.html">Create an account</a></p>';
    } else {
      (async () => {
        try {
          const u = await VC.getUserByName(current);
          if(!u){ 
            box.innerHTML = '<p class="small">User not found. <a href="signup.html">Create account</a></p>';
            return;
          }

          box.innerHTML = `
            <div class="card">
              <div style="display:flex;gap:12px;align-items:center">
                <div style="width:80px;height:80px;border-radius:10px;overflow:hidden;background:rgba(255,255,255,0.02);flex-shrink:0">
                  ${u.profilePic? `<img src="${u.profilePic}" alt="avatar" style="width:100%;height:100%;object-fit:cover">` : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted)">No photo</div>'}
                </div>
                <div>
                  <h2 style="margin:0">${u.playerName}</h2>
                  <div class="small">${u.location||''}</div>
                </div>
              </div>
              <p style="margin-top:12px"><strong>Full name:</strong> ${u.fullName||'-'}</p>
              <p><strong>Birth date:</strong> ${u.birthDate||'-'}</p>
              <p><strong>Location:</strong> ${u.location||'-'}</p>
              <p><strong>Email:</strong> ${u.email||'-'}</p>
              <p><strong>Password:</strong> ${u.password||'-'}</p>
              <div style="margin-top:12px">
                <label class="small">Change profile picture<br><input id="newPic" type="file" accept="image/*" style="margin-top:6px"></label>
                <p style="margin-top:8px"><button id="logoutBtn" class="btn">Log out</button></p>
              </div>
            </div>
          `;

          // incoming trade requests
          const requests = await VC.getRequests();
          const incoming = requests.filter(r=>r.toUser===current && r.status==='pending');
          if(incoming.length){
            const reqHtml = ['<h3 style="margin-top:14px">Incoming Trade Requests</h3>'];
            incoming.forEach(req=>{
              reqHtml.push(`<div class="card" data-req-id="${req.id}" style="margin-top:8px">
                <p><strong>From:</strong> ${req.fromUser}</p>
                <p><strong>Loadout ID:</strong> ${req.loadoutId}</p>
                <div style="display:flex;gap:8px;margin-top:8px">
                  <button class="btn btnAccept" data-id="${req.id}">Accept</button>
                  <button class="btn btnDecline" data-id="${req.id}">Decline</button>
                </div>
              </div>`);
            });
            box.insertAdjacentHTML('beforeend', reqHtml.join('\n'));
            
            // Attach request handlers
            box.querySelectorAll('.btnAccept').forEach(b=>{
              b.addEventListener('click', async () => {
                const id = b.getAttribute('data-id');
                await VC.updateRequestStatus(id, 'accepted');
                b.textContent = 'Accepted';
                b.disabled = true;
              });
            });
            box.querySelectorAll('.btnDecline').forEach(b=>{
              b.addEventListener('click', async () => {
                const id = b.getAttribute('data-id');
                await VC.updateRequestStatus(id, 'declined');
                b.textContent = 'Declined';
                b.disabled = true;
              });
            });
          }

          document.getElementById('logoutBtn').addEventListener('click', ()=>{
            VC.logout();
            window.location.href = 'index.html';
          });

          document.getElementById('newPic').addEventListener('change', async function(){
            const f = this.files[0]; 
            if(!f) return;
            const r = new FileReader();
            r.onload = async ()=>{
              await VC.setProfilePic(u.playerName, r.result);
              setTimeout(() => window.location.reload(), 400);
            };
            r.readAsDataURL(f);
          });
        } catch(err) {
          console.error('Profile load error:', err);
          box.innerHTML = '<p class="small">Error loading profile. <a href="index.html">Go home</a></p>';
        }
      })();
    }
  </script>
</body>
</html>
