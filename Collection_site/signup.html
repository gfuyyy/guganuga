<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign Up - ValuableCoins</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html">ValuableCoins</a>
      <nav class="nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="new-coins.html" class="nav-link">New Coins</a>
        <a href="about.html" class="nav-link">About</a>
        <a id="nav-create" href="create-loadout.html" class="nav-link">Create</a>
        <a href="loadouts.html" class="nav-link">Loadouts</a>
        <a id="nav-signup" href="signup.html" class="nav-link">Sign Up</a>
        <a id="nav-profile" href="profile.html" class="nav-link">Profile</a>
      </nav>
    </div>
  </header>

  <main class="container" style="padding:28px 0">
    <h1>Create Account</h1>
    <p class="small">Sign up with your email; choose a player name and upload an optional profile picture.</p>

    <form id="signupForm" style="max-width:520px;margin-top:12px">
      <label>Email (will be your login)<br>
        <input id="email" required type="email" style="width:100%;padding:8px;margin-top:6px;border-radius:6px;border:1px solid rgba(255,255,255,0.06)">
      </label>
      <label style="display:block;margin-top:10px">Player name (display)<br>
        <input id="playerName" required type="text" style="width:100%;padding:8px;margin-top:6px;border-radius:6px;border:1px solid rgba(255,255,255,0.06)">
      </label>
      <label style="display:block;margin-top:10px">Full name<br>
        <input id="fullName" type="text" style="width:100%;padding:8px;margin-top:6px;border-radius:6px;border:1px solid rgba(255,255,255,0.06)">
      </label>
      <label style="display:block;margin-top:10px">Birth date<br>
        <input id="birthDate" type="date" style="width:100%;padding:8px;margin-top:6px;border-radius:6px;border:1px solid rgba(255,255,255,0.06)">
      </label>
      <label style="display:block;margin-top:10px">Location<br>
        <input id="location" type="text" placeholder="City, Country" style="width:100%;padding:8px;margin-top:6px;border-radius:6px;border:1px solid rgba(255,255,255,0.06)">
      </label>
      <label style="display:block;margin-top:10px">Password<br>
        <input id="password" type="password" required style="width:100%;padding:8px;margin-top:6px;border-radius:6px;border:1px solid rgba(255,255,255,0.06)">
      </label>
      <label style="display:block;margin-top:10px">Profile picture (optional)<br>
        <input id="profilePic" type="file" accept="image/*" style="margin-top:6px">
      </label>

      <p style="margin-top:12px">
        <button class="btn primary" type="submit">Create Account</button>
        <a href="index.html" class="btn" style="margin-left:8px">Cancel</a>
      </p>

      <p id="msg" class="small" style="margin-top:8px;color:var(--accent-2)"></p>
    </form>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div>© <span id="year4"></span> ValuableCoins</div>
      <div class="small">Secure demo accounts stored locally</div>
    </div>
  </footer>

    <script src="server-config.js"></script>
    <script src="api-client.js"></script>
    <script src="storage-display.js"></script>
    <script>
      document.getElementById('year4').textContent = new Date().getFullYear();

    document.getElementById('signupForm').addEventListener('submit', async function(e){
      e.preventDefault();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const playerName = document.getElementById('playerName').value.trim();
      const fullName = document.getElementById('fullName').value.trim();
      const birthDate = document.getElementById('birthDate').value;
      const location = document.getElementById('location').value.trim();
      const password = document.getElementById('password').value;
      const picFile = document.getElementById('profilePic').files[0];

      if(!email || !playerName || !password){ document.getElementById('msg').textContent = 'Email, player name and password are required.'; return; }

      document.getElementById('msg').textContent = 'Creating account...';
      document.querySelector('button[type=submit]').disabled = true;

      try {
        // Convert profile pic to data URL if provided
        let profilePicData = null;
        if(picFile) {
          profilePicData = await new Promise((resolve, reject) => {
            const r = new FileReader();
            r.onload = () => resolve(r.result);
            r.onerror = reject;
            r.readAsDataURL(picFile);
          });
        }

        // Call server API to create user
        const result = await VC.createUser(playerName, email, password, fullName, birthDate, location, profilePicData);
        VC.setCurrentUser(playerName);
        document.getElementById('msg').textContent = 'Account created! Redirecting...';
        setTimeout(() => window.location.href = 'profile.html', 800);
      } catch(err) {
        document.getElementById('msg').textContent = 'Error: ' + (err.message || 'Failed to create account');
        document.querySelector('button[type=submit]').disabled = false;
      }
    });
    </script>
</body>
</html>
